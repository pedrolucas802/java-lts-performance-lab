
quarkus.jackson.fail-on-unknown-properties=false

quarkus.banner.enabled=false

smallrye.health.root-path=/health

# Optional DB-backed benchmark path. The existing synthetic benchmarks should
# keep running without a database, and the DB-backed endpoint is enabled only
# when callers provide a JDBC URL.
benchmark.datasource.url=${BENCHMARK_DATASOURCE_URL:}
benchmark.datasource.username=${BENCHMARK_DATASOURCE_USERNAME:benchmark}
benchmark.datasource.password=${BENCHMARK_DATASOURCE_PASSWORD:benchmark}
benchmark.datasource.initial-size=${BENCHMARK_DATASOURCE_INITIAL_SIZE:2}
benchmark.datasource.min-size=${BENCHMARK_DATASOURCE_MIN_SIZE:2}
benchmark.datasource.max-size=${BENCHMARK_DATASOURCE_MAX_SIZE:16}
benchmark.datasource.acquisition-timeout-seconds=${BENCHMARK_DATASOURCE_ACQUISITION_TIMEOUT_SECONDS:2}
